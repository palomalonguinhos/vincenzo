<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Abra</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-end; /* alinhamos no final da tela */
  background:linear-gradient(135deg,#e8e8e8,#ffffff);
  font-family:Arial, sans-serif;
  overflow:hidden;
}

.container{
  position:relative;
  text-align:center;
  margin-bottom:50px; /* dá espaço para a camisa subir */
}

/* ENVELOPE */
.envelope{
  width:220px;
  height:140px;
  background:#d32f2f;
  position:relative;
  cursor:pointer;
  border-radius:6px;
  transition:transform .4s;
}

.envelope:hover{
  transform:scale(1.05);
}

.envelope:before{
  content:"";
  position:absolute;
  top:-70px;
  left:0;
  border-left:110px solid transparent;
  border-right:110px solid transparent;
  border-bottom:70px solid #b71c1c;
  transform-origin:bottom;
  transition:0.8s;
}

.envelope.open:before{
  transform:rotateX(180deg);
}

.label{
  position:absolute;
  width:100%;
  top:50%;
  transform:translateY(-50%);
  color:white;
  font-weight:bold;
  font-size:22px;
  letter-spacing:2px;
}

/* CAMISA */
.shirt{
  position:absolute;
  left:50%;
  bottom:0; /* começa da base da tela */
  transform:translateX(-50%) translateY(0) scale(.5);
  width:240px;
  height:260px;
  background:white;
  border-radius:12px;
  border:3px solid #ddd;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  opacity:0;
  transition:1.2s ease;
}

/* mangas */
.shirt:before, .shirt:after{
  content:"";
  position:absolute;
  width:70px;
  height:90px;
  background:white;
  top:10px;
  border:3px solid #ddd;
}

.shirt:before{
  left:-70px;
  border-right:none;
  border-radius:25px 0 0 25px;
}

.shirt:after{
  right:-70px;
  border-left:none;
  border-radius:0 25px 25px 0;
}

/* ESCUDO */
.shield{
  width:60px;
  height:60px;
  margin-bottom:10px;
}

/* NOME */
.rm{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.name{
  font-size:22px;
  letter-spacing:1px;
}
.show{
  transform:translateX(-50%) translateY(-220px) scale(1); /* sobe menos que antes */
  opacity:1;
}
</style>
</head>

<body>

<div class="container">
  <div class="envelope" onclick="openEnvelope(this)">
    <div class="label">ABRA</div>
  </div>

  <div class="shirt" id="shirt">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" alt="Escudo Real Madrid" class="shield">
    <div class="rm">Real Madrid</div>
    <div class="name">VINCENZO BAGGIO</div>
  </div>
</div>

<script>
function openEnvelope(el){
  el.classList.add("open");
  setTimeout(()=>{
    document.getElementById("shirt").classList.add("show");
  },800);
}
</script>

</body>
</html>
